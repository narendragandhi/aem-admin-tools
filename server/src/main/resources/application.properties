# Server Configuration
server.port=${SERVER_PORT:10004}
agent.base-url=${AGENT_BASE_URL:http://localhost:${server.port}}

# Database Configuration (H2 - Development Default)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:admintools;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (Development only)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# AEM Connection
aem.enabled=${AEM_ENABLED:true}
aem.author-url=${AEM_AUTHOR_URL:http://localhost:4502}
aem.publish-url=${AEM_PUBLISH_URL:http://localhost:4503}
aem.username=${AEM_USERNAME:admin}
aem.password=${AEM_PASSWORD:}
aem.timeout.connection=${AEM_TIMEOUT_CONNECTION:10000}
aem.timeout.request=${AEM_TIMEOUT_REQUEST:30000}
aem.timeout.socket=${AEM_TIMEOUT_SOCKET:30000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:8081}

# LLM Configuration
llm.enabled=${LLM_ENABLED:true}
llm.provider=${LLM_PROVIDER:ollama}

# Ollama (default - local)
llm.ollama-url=${LLM_OLLAMA_URL:http://localhost:11434}
llm.ollama-model=${LLM_OLLAMA_MODEL:llama3.2}

# OpenAI (optional)
llm.openai-api-key=${LLM_OPENAI_API_KEY:}
llm.openai-model=${LLM_OPENAI_MODEL:gpt-4o-mini}

# Anthropic (optional)
llm.anthropic-api-key=${LLM_ANTHROPIC_API_KEY:}
llm.anthropic-model=${LLM_ANTHROPIC_MODEL:claude-3-haiku-20240307}

# LLM Timeout Configuration (milliseconds)
llm.timeout.connection=${LLM_TIMEOUT_CONNECTION:10000}
llm.timeout.request=${LLM_TIMEOUT_REQUEST:60000}
llm.timeout.socket=${LLM_TIMEOUT_SOCKET:60000}

# Job Configuration
jobs.max-concurrent=${JOBS_MAX_CONCURRENT:3}
jobs.history-retention-hours=${JOBS_HISTORY_RETENTION_HOURS:24}

# Logging
logging.level.io.cxforge.admintools=${LOG_LEVEL:INFO}
logging.level.root=${ROOT_LOG_LEVEL:WARN}

# Spring Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Application Info
info.app.name=CXForge Admin Tools
info.app.description=Modern admin tools for AEM - Content Experience Forge
info.app.version=@project.version@

# Security
security.enabled=${SECURITY_ENABLED:false}
security.admin.username=${SECURITY_ADMIN_USERNAME:admin}
security.admin.password=${SECURITY_ADMIN_PASSWORD:}

# OAuth2/OIDC (Enterprise Authentication)
security.oauth2.enabled=${OAUTH2_ENABLED:false}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI:}
security.oauth2.tenant-claim=${OAUTH2_TENANT_CLAIM:tenant_id}
security.oauth2.roles-claim=${OAUTH2_ROLES_CLAIM:roles}

# Multi-tenancy
multitenancy.enabled=${MULTITENANCY_ENABLED:false}
multitenancy.default-tenant=${MULTITENANCY_DEFAULT_TENANT:default}

# Redis (Distributed State)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}
redis.enabled=${REDIS_ENABLED:false}

# Distributed Tracing (OpenTelemetry)
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.1}
management.otlp.tracing.endpoint=${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.tracing.propagation.type=w3c

# Rate Limiting
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
rate-limit.jobs-per-minute=${RATE_LIMIT_JOBS_PER_MINUTE:10}

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.aem.register-health-indicator=true
resilience4j.circuitbreaker.instances.aem.sliding-window-size=10
resilience4j.circuitbreaker.instances.aem.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.aem.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aem.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aem.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aem.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Retry Configuration
resilience4j.retry.instances.aem.max-attempts=3
resilience4j.retry.instances.aem.wait-duration=1s
resilience4j.retry.instances.aem.enable-exponential-backoff=true
resilience4j.retry.instances.aem.exponential-backoff-multiplier=2

# LLM Circuit Breaker
resilience4j.circuitbreaker.instances.llm.register-health-indicator=true
resilience4j.circuitbreaker.instances.llm.sliding-window-size=5
resilience4j.circuitbreaker.instances.llm.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.llm.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.llm.wait-duration-in-open-state=60s

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
